        - { label: "Paragraf", name: "lede", widget: "text" }
        - { label: "Judul Peta (aksesibilitas)", name: "mapTitle", widget: "string" }

# ---------- Collections ----------
collections:
  - name: "pages_id"
    label: "Halaman (Bahasa Indonesia)"
    description: "Edit teks & foto halaman versi Bahasa Indonesia"
    files:
      - { label: "Beranda", name: "home", file: "src/_data/pagedata/id/home.json", preview_path: "id/", fields: *home_fields }
      - { label: "Tentang Kami", name: "about", file: "src/_data/pagedata/id/about.json", preview_path: "id/tentang-kami/", fields: *about_fields }
      - { label: "Produk & Layanan", name: "products", file: "src/_data/pagedata/id/products.json", preview_path: "id/produk/", fields: *products_fields }
      - { label: "Manufaktur & Kualitas", name: "manufacturing", file: "src/_data/pagedata/id/manufacturing.json", preview_path: "id/manufaktur/", fields: *manufacturing_fields }
      - { label: "Industri", name: "industries", file: "src/_data/pagedata/id/industries.json", preview_path: "id/industri/", fields: *industries_fields }
      - { label: "Klien", name: "clients", file: "src/_data/pagedata/id/clients.json", preview_path: "id/klien/", fields: *clients_fields }
      - { label: "Hubungi Kami", name: "contact", file: "src/_data/pagedata/id/contact.json", preview_path: "id/kontak/", fields: *contact_fields }

  - name: "pages_en"
    label: "Halaman (English)"
    description: "Edit teks & foto halaman versi English"
    files:
      - { label: "Home", name: "home", file: "src/_data/pagedata/en/home.json", preview_path: "", fields: *home_fields }
      - { label: "About Us", name: "about", file: "src/_data/pagedata/en/about.json", preview_path: "about/", fields: *about_fields }
      - { label: "Products & Services", name: "products", file: "src/_data/pagedata/en/products.json", preview_path: "products/", fields: *products_fields }
      - { label: "Manufacturing & Quality", name: "manufacturing", file: "src/_data/pagedata/en/manufacturing.json", preview_path: "manufacturing/", fields: *manufacturing_fields }
      - { label: "Industries", name: "industries", file: "src/_data/pagedata/en/industries.json", preview_path: "industries/", fields: *industries_fields }
      - { label: "Clients", name: "clients", file: "src/_data/pagedata/en/clients.json", preview_path: "clients/", fields: *clients_fields }
      - { label: "Contact Us", name: "contact", file: "src/_data/pagedata/en/contact.json", preview_path: "contact/", fields: *contact_fields }

  - name: "custom_pages"
    label: "Halaman Baru"
    label_singular: "Halaman"
    description: "Tambah halaman baru di luar 7 halaman utama (mis. berita, promo, halaman produk khusus)"
    folder: "src/custom"
    create: true
    extension: "md"
    slug: "{{fields.lang}}-{{fields.slug}}"
    fields:
      - { label: "Bahasa", name: "lang", widget: "select", options: [{ label: "English", value: "en" }, { label: "Bahasa Indonesia", value: "id" }], default: "id" }
      - { label: "Slug URL (huruf kecil, tanpa spasi — mis. berita-pabrik-baru)", name: "slug", widget: "string", pattern: ["^[a-z0-9-]+$", "Hanya huruf kecil, angka, dan tanda hubung"] }
      - { label: "Judul Halaman", name: "title", widget: "string" }
      - { label: "Deskripsi Singkat", name: "description", widget: "text", required: false }
      - { label: "Label Kecil (Eyebrow)", name: "eyebrow", widget: "string", required: false }
      - { label: "Foto Utama", name: "heroImage", widget: "image", required: false }
      - { label: "Teks Alt Foto", name: "heroImageAlt", widget: "string", required: false }
      - { label: "Isi Halaman", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Pengaturan Situs"
    files:
      - label: "Info Perusahaan & Kontak"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Base URL Situs (ganti saat pindah domain)", name: "baseUrl", widget: "string" }
          - { label: "Nama Perusahaan", name: "companyName", widget: "string" }
          - { label: "Telepon (tampilan)", name: "phone", widget: "string" }
          - { label: "Telepon (link tel:)", name: "phoneHref", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Alamat", name: "address", widget: "text" }
          - { label: "Website (tampilan)", name: "websiteLabel", widget: "string" }
          - { label: "Website (URL)", name: "websiteUrl", widget: "string" }
          - { label: "URL Embed Google Maps", name: "mapEmbedUrl", widget: "string" }
          - { label: "ID Widget WhatsApp (Elfsight)", name: "whatsappWidgetId", widget: "string" }
          - { label: "File PDF Profil Perusahaan", name: "profilePdf", widget: "string" }
      - label: "Peta Distribusi (halaman Klien)"
        name: "distribution"
        file: "src/_data/distribution.json"
        fields:
          - { label: "URL Embed Google My Maps (opsional — jika diisi, menggantikan peta bawaan)", name: "embedUrl", widget: "string", required: false, default: "", hint: "Buat peta di mymaps.google.com → Share → Embed on my site → salin URL src iframe-nya" }
          - label: "Titik Kota"
            name: "points"
            widget: "list"
            fields:
              - { label: "Nama Kota", name: "name", widget: "string" }
              - { label: "Provinsi/Wilayah", name: "region", widget: "string" }
              - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
