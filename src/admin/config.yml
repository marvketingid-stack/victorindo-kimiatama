      collapsed: true
      fields:
        - { label: "Eyebrow", name: "eyebrow", widget: "string" }
        - { label: "Judul", name: "heading", widget: "string" }
        - { label: "Paragraf", name: "lede", widget: "text" }
        - label: "Kartu"
          name: "cards"
          widget: "list"
          fields:
            - { label: "Kode (mis. ISO 9001)", name: "code", widget: "string" }
            - { label: "Subjudul", name: "subtitle", widget: "string" }
            - { label: "Deskripsi", name: "desc", widget: "text" }
        - { label: "Teks Tombol", name: "cta", widget: "string" }
    - *cta_band

