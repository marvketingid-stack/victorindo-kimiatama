# Decap CMS — PT Victorindo Kimiatama
# Admin: https://victorindokimiatama.com/admin/
backend:
  name: github
  repo: marvketingid-stack/victorindo-kimiatama
  branch: main
  # "Satpam login" = Netlify (gratis, cuma buat login; website di-host di Hostinger).
  base_url: https://api.netlify.com
  # Kenalin satpam login ke website: walau /admin diakses dari domain Hostinger,
  # login tetap diarahkan ke site Netlify yang punya setelan OAuth GitHub.
  site_domain: victorindo-kimiatama.netlify.app

# Saat diakses dari localhost + `npx decap-server` berjalan, pakai backend lokal (tanpa login GitHub)
local_backend: true

media_folder: "src/assets/img"
public_folder: "/assets/img"
site_url: https://victorindokimiatama.com
display_url: https://victorindokimiatama.com
logo_url: https://victorindokimiatama.com/assets/img/logo-vk.png
locale: id

# ---------- Field schema definitions (dipakai ulang EN & ID) ----------
x_schemas:
  meta: &meta
    label: "Meta / SEO"
    name: "meta"
    widget: "object"
    collapsed: true
    fields:
      - { label: "Judul Tab Browser", name: "title", widget: "string" }
      - { label: "Deskripsi (Google)", name: "description", widget: "text" }
  page_hero: &page_hero
    label: "Hero Halaman"
    name: "hero"
    widget: "object"
    fields:
      - { label: "Breadcrumb", name: "breadcrumb", widget: "string" }
      - { label: "Label Kecil (Eyebrow)", name: "eyebrow", widget: "string" }
      - { label: "Judul Besar", name: "heading", widget: "string" }
      - { label: "Paragraf Pembuka", name: "lede", widget: "text" }
  cta_band: &cta_band
    label: "Banner CTA Bawah"
    name: "ctaBand"
    widget: "object"
    collapsed: true
    fields:
      - { label: "Label", name: "label", widget: "string" }
      - { label: "Judul", name: "heading", widget: "string" }

  home_fields: &home_fields
    - *meta
    - label: "Hero"
      name: "hero"
      widget: "object"
      fields:
        - { label: "Label Kecil (Kicker)", name: "kicker", widget: "string" }
        - { label: "Judul Besar", name: "heading", widget: "string" }
        - { label: "Paragraf Pembuka", name: "lede", widget: "text" }
        - { label: "Foto Latar", name: "image", widget: "image" }
        - { label: "Teks Alt Foto", name: "imageAlt", widget: "string" }
    - label: "Angka Statistik"
