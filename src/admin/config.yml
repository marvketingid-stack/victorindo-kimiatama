        - { label: "Judul", name: "heading", widget: "string" }
        - { label: "Paragraf 1", name: "p1", widget: "text" }
        - { label: "Paragraf 2", name: "p2", widget: "text" }
        - { label: "Chips", name: "chips", widget: "list" }
        - { label: "Teks Tombol", name: "cta", widget: "string" }
        - { label: "Foto", name: "image", widget: "image" }
        - { label: "Teks Alt Foto", name: "imageAlt", widget: "string" }
    - label: "Sektor Bisnis"
      name: "sectors"
      widget: "object"
      collapsed: true
      fields:
        - { label: "Eyebrow", name: "eyebrow", widget: "string" }
        - { label: "Judul", name: "heading", widget: "string" }
        - { label: "Paragraf", name: "lede", widget: "text" }
        - { label: "Teks Tombol Kartu", name: "ctaLabel", widget: "string" }
        - label: "Kartu Sektor"
          name: "cards"
          widget: "list"
          fields:
            - { label: "Index (mis. SECTOR / 01)", name: "index", widget: "string" }
            - { label: "Judul", name: "title", widget: "string" }
            - { label: "Deskripsi", name: "desc", widget: "text" }
            - { label: "Foto", name: "image", widget: "image" }
            - { label: "Teks Alt Foto", name: "imageAlt", widget: "string" }
            - { label: "Chips", name: "chips", widget: "list" }
            - { label: "Anchor Link", name: "anchor", widget: "string", hint: "automotive / marine / architectural" }
    - label: "Manufaktur & Kapasitas"
      name: "manufacturing"
      widget: "object"
      collapsed: true
      fields:
        - { label: "Eyebrow", name: "eyebrow", widget: "string" }
        - { label: "Judul", name: "heading", widget: "string" }
        - { label: "Paragraf", name: "lede", widget: "text" }
        - { label: "Aria Label", name: "capacityAria", widget: "string" }
        - label: "Kapasitas Produksi"
          name: "capacities"
          widget: "list"
          fields:
            - { label: "Nama Produk", name: "name", widget: "string" }
            - { label: "Persen Bar (0-100)", name: "pct", widget: "number", value_type: "int", min: 0, max: 100 }
            - { label: "Nilai (mis. 100 MT)", name: "value", widget: "string" }
        - { label: "Teks Tombol", name: "cta", widget: "string" }
        - { label: "Foto", name: "image", widget: "image" }
        - { label: "Teks Alt Foto", name: "imageAlt", widget: "string" }
    - label: "Strip Klien"
      name: "trust"
      widget: "object"
      collapsed: true
      fields:
        - { label: "Aria Label", name: "ariaLabel", widget: "string" }
        - { label: "Judul Strip", name: "label", widget: "string" }
        - label: "Klien"
          name: "items"
          widget: "list"
          fields:
            - { label: "Nama", name: "name", widget: "string" }
            - { label: "Logo", name: "logo", widget: "image", required: false }
    - label: "Sertifikasi"
      name: "certs"
